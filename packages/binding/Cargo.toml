[package]
authors = ["ishiko <ishiko732@gmail.com>"]
edition = "2024"
name = "fsrs-binding"
version = "0.0.2"

[lib]
crate-type = ["cdylib"]


[dependencies]
napi = { version = "3.9.0", default-features = true }
napi-derive = "3.5.6"
csv = "1.3.0"
time = { version = "0.3", default-features = false, features = [
  "alloc",
  # "macros",
] }
serde = "1.0.228"
serde_json = "1.0.143"
itertools = "0.14.0"

[dependencies.fsrs]
version = "6.1.0"
default-features = false
features = ["experimental_cost_adr"]

[build-dependencies]
napi-build = "2"
